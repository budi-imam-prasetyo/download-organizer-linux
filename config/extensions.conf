# extensions.conf — extension-to-folder routing table
#
# Format:
#   extension=Category/subfolder
#
# Rules:
#   - One entry per line.
#   - Extension must be lowercase, without leading dot.
#   - Category/subfolder is relative to the Downloads directory.
#   - Lines starting with # are comments; blank lines are ignored.
#   - Duplicate extensions: last entry wins.
#
# Special built-in keys handled by routing.sh (not listed here):
#   __no_extension__   → files with no extension
#   __partial__        → files matching partial-download patterns (.crdownload etc.)
#   __unknown__        → any extension not matched below
#
# To add a new mapping, append a line. No need to touch any .sh file.

# ---------------------------------------------------------------------------
# Images
# ---------------------------------------------------------------------------
png=01 Images/png
jpg=01 Images/jpg-jpeg
jpeg=01 Images/jpg-jpeg
webp=01 Images/webp
gif=01 Images/gif
